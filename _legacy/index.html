<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Split — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f9f9f8;
    --surface: #ffffff;
    --border: #e5e5e3;
    --text: #1a1a18;
    --muted: #6b6b68;
    --accent: #1a1a18;
    --green: #16a34a;
    --green-bg: #f0fdf4;
    --green-border: #bbf7d0;
    --amber: #d97706;
    --amber-bg: #fffbeb;
    --amber-border: #fde68a;
    --red: #dc2626;
    --radius: 10px;
    --radius-sm: 6px;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .container { max-width: 640px; margin: 0 auto; padding: 2rem 1rem 4rem; }
  .logo { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; margin-bottom: 2rem; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 2rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 10px; }
  .dish-row { display: flex; align-items: flex-start; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .dish-row:last-child { border-bottom: none; padding-bottom: 0; }
  .dish-row:first-child { padding-top: 0; }
  .dish-info { flex: 1; min-width: 0; }
  .dish-name { font-size: 13px; font-weight: 500; line-height: 1.4; }
  .dish-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .dish-right { text-align: right; min-width: 90px; }
  .dish-price { font-size: 13px; font-weight: 600; }
  .toggle-row { display: flex; align-items: center; gap: 6px; justify-content: flex-end; margin-top: 6px; }
  .toggle-label { font-size: 12px; color: var(--muted); }
  .toggle { position: relative; width: 32px; height: 18px; cursor: pointer; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: var(--border); border-radius: 18px; transition: background 0.2s; }
  .slider::before { content: ""; position: absolute; width: 12px; height: 12px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: transform 0.2s; }
  .toggle input:checked + .slider { background: var(--accent); }
  .toggle input:checked + .slider::before { transform: translateX(14px); }
  .split-n { display: flex; align-items: center; gap: 6px; justify-content: flex-end; margin-top: 6px; }
  .split-n label { font-size: 12px; color: var(--muted); }
  .split-n input { width: 44px; font-size: 13px; padding: 3px 6px; border: 1px solid var(--border); border-radius: var(--radius-sm); text-align: center; font-family: inherit; background: var(--bg); }
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.25rem; }
  .metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; }
  .metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .metric-value { font-size: 18px; font-weight: 600; }
  .btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; padding: 9px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-primary:hover { opacity: 0.85; }
  .btn-ghost { background: transparent; color: var(--text); }
  .btn-ghost:hover { background: var(--bg); }
  .publish-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-top: 1rem; display: none; }
  .publish-box.active { display: block; }
  .link-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 12px; font-family: monospace; color: var(--muted); word-break: break-all; margin: 10px 0; }
  .qr-wrap { display: flex; justify-content: center; margin: 1.25rem 0; }
  .badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 100px; }
  .badge-green { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .badge-amber { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
  .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 10px; }
  .actions { display: flex; gap: 8px; margin-top: 1.25rem; flex-wrap: wrap; }
  #qrcode canvas, #qrcode img { border-radius: var(--radius-sm); }
</style>
</head>
<body>
<div class="container">
  <div class="logo">Split · Admin</div>
  <h1>Configurar cobro</h1>
  <p class="subtitle">Marca los platos que se dividen, pon entre cuántos y publica.</p>

  <div class="metrics">
    <div class="metric"><div class="metric-label">Total real</div><div class="metric-value">S/ 392.40</div></div>
    <div class="metric"><div class="metric-label">Platos</div><div class="metric-value" id="m-items">—</div></div>
    <div class="metric"><div class="metric-label">Pagado</div><div class="metric-value" id="m-paid">S/ 0.00</div></div>
  </div>

  <div class="section-label">Platos del ticket</div>
  <div class="card" id="dishes-list"></div>

  <div class="actions">
    <button class="btn btn-primary" onclick="publish()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      Publicar cobro
    </button>
  </div>

  <div class="publish-box" id="publish-box">
    <div class="section-label">Link para compartir</div>
    <div class="link-box" id="share-url"></div>
    <div class="qr-wrap"><div id="qrcode"></div></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-ghost" onclick="copyURL()">Copiar link</button>
      <a class="btn btn-ghost" id="guest-link" target="_blank">Abrir vista invitado</a>
    </div>

    <div class="section-label" style="margin-top:1.5rem">Quién ha pagado</div>
    <div class="card" id="payers-list"><div class="dish-meta">Aún nadie ha pagado.</div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="supabase-config.js"></script>
<script>
const TOTAL_REAL = 392.40;
const DISHES = [
  {id:"d1", name:"Menú milanesa de pollo — Spaghetti pesto", qty:3, unit:19.90},
  {id:"d2", name:"Menú milanesa de pollo — Spaghetti alfredo", qty:2, unit:19.90},
  {id:"d3", name:"Menú milanesa de pollo — Arroz/papa/ensalada", qty:2, unit:19.90},
  {id:"d4", name:"Fettuccini 3 quesos y champiñones", qty:2, unit:24.90},
  {id:"d5", name:"Menú apanado de res — Spaghetti alfredo", qty:1, unit:26.80},
  {id:"d6", name:"Milanesa napolitana", qty:2, unit:29.90},
  {id:"d7", name:"Hamburguesa Angus al plato", qty:1, unit:24.90},
  {id:"d8", name:"Pollo saltado", qty:1, unit:25.90},
  {id:"d9", name:"Menú milanesa de pollo — Spaghetti pesto", qty:1, unit:19.90},
  {id:"d10", name:"Helado cumpleaños", qty:1, unit:0.00},
  {id:"d11", name:"Volcán de chocolate", qty:1, unit:26.00},
];
const subtotalBase = DISHES.reduce((s,d)=>s+d.qty*d.unit,0);
const ratio = TOTAL_REAL / subtotalBase;
const fmt = n => "S/ "+n.toFixed(2);

// Aplanamos: cada unidad de un plato es una fila propia (cantidad 3 -> 3 platos).
const UNITS = [];
DISHES.forEach(d => {
  for (let u = 0; u < d.qty; u++) {
    UNITS.push({ id: d.id + "_u" + u, name: d.name, unit: d.unit });
  }
});

let config = {};
UNITS.forEach(u=>{ config[u.id]={shared:false, splitN:2}; });

// key del item -> nombre del plato (se llena al publicar, para mostrarlo en "Quién ha pagado")
let itemNames = {};

function buildList() {
  const c = document.getElementById("dishes-list");
  c.innerHTML = "";
  UNITS.forEach(u => {
    const cfg = config[u.id];
    const row = document.createElement("div");
    row.className = "dish-row";
    row.innerHTML = `
      <div class="dish-info">
        <div class="dish-name">${u.name}</div>
        <div class="dish-meta">1 plato</div>
      </div>
      <div class="dish-right">
        <div class="dish-price">${fmt(u.unit)}</div>
        <div class="toggle-row">
          <span class="toggle-label">Dividir</span>
          <label class="toggle">
            <input type="checkbox" ${cfg.shared?"checked":""} onchange="toggleShared('${u.id}',this.checked)" />
            <span class="slider"></span>
          </label>
        </div>
        <div class="split-n" id="sn-${u.id}" style="display:${cfg.shared?"flex":"none"}">
          <label>entre</label>
          <input type="number" min="2" max="30" value="${cfg.splitN}" onchange="setSplitN('${u.id}',this.value)" />
          <label>pers.</label>
        </div>
      </div>`;
    c.appendChild(row);
  });
  document.getElementById("m-items").textContent = UNITS.length;
}

function toggleShared(id, val) {
  config[id].shared = val;
  if (val) {
    // Por defecto se divide entre los platos que siguen activos (los que sí pagarán).
    const payers = UNITS.filter(u => !config[u.id].shared).length;
    config[id].splitN = Math.max(2, payers);
  }
  buildList(); // re-render para reflejar el nuevo "entre N" (sigue siendo editable)
}
function setSplitN(id, v) { config[id].splitN = Math.max(2, parseInt(v)||2); }

async function publish() {
  const items = buildItems();
  itemNames = {};
  items.forEach(it => { itemNames[it.key] = it.name; });
  const cobroId = "cumple-" + Date.now();
  const { error } = await db.from("bills").insert({
    id: cobroId,
    items,
    total_amount: TOTAL_REAL,
  });
  if (error) { alert("No se pudo publicar el cobro: " + error.message); return; }

  const base = window.location.origin;
  const url = `${base}/guest.html?id=${cobroId}`;
  document.getElementById("share-url").textContent = url;
  document.getElementById("guest-link").href = url;
  document.getElementById("publish-box").classList.add("active");

  document.getElementById("qrcode").innerHTML = "";
  new QRCode(document.getElementById("qrcode"), { text: url, width: 160, height: 160 });

  listenPagos(cobroId);
  document.querySelector(".actions").innerHTML = `<button class="btn btn-ghost" onclick="location.reload()">Nuevo cobro</button>`;
}

function buildItems() {
  const items = [];
  UNITS.forEach(u => {
    const cfg = config[u.id];
    const unitTotal = u.unit * ratio;
    if (cfg.shared) {
      const per = unitTotal / cfg.splitN;
      for (let i = 0; i < cfg.splitN; i++) {
        items.push({ key: u.id+"_p"+i, name: u.name+" (parte "+(i+1)+"/"+cfg.splitN+")", amount: parseFloat(per.toFixed(2)), shared: true });
      }
    } else {
      items.push({ key: u.id, name: u.name, amount: parseFloat(unitTotal.toFixed(2)), shared: false });
    }
  });
  return items;
}

async function listenPagos(cobroId) {
  let pagos = [];

  // 1) Carga los pagos que ya existan.
  const { data } = await db.from("payments").select("*").eq("bill_id", cobroId);
  pagos = data || [];
  renderPagos(pagos);

  // 2) Suscríbete en tiempo real a cada pago nuevo.
  db.channel("admin-" + cobroId)
    .on("postgres_changes",
      { event: "INSERT", schema: "public", table: "payments", filter: "bill_id=eq." + cobroId },
      payload => { pagos.push(payload.new); renderPagos(pagos); })
    .subscribe();
}

function renderPagos(pagos) {
  const paid = pagos.reduce((s,p) => s + (Number(p.amount) || 0), 0);
  document.getElementById("m-paid").textContent = fmt(paid);

  const list = document.getElementById("payers-list");
  if (!pagos.length) {
    list.innerHTML = `<div class="dish-meta">Aún nadie ha pagado.</div>`;
    return;
  }
  list.innerHTML = "";
  [...pagos].sort((a,b)=> (a.created_at||"").localeCompare(b.created_at||"")).forEach(p => {
    const row = document.createElement("div");
    row.className = "dish-row";
    row.innerHTML = `
      <div class="dish-info">
        <div class="dish-name">${p.name}</div>
        <div class="dish-meta">${itemNames[p.item_key] || p.item_key}</div>
      </div>
      <div class="dish-right">
        <div class="dish-price">${fmt(Number(p.amount)||0)}</div>
        <span class="badge badge-green">✓ Pagado</span>
      </div>`;
    list.appendChild(row);
  });
}

function copyURL() {
  navigator.clipboard.writeText(document.getElementById("share-url").textContent);
  event.target.textContent = "¡Copiado!";
  setTimeout(()=>event.target.textContent="Copiar link", 2000);
}

buildList();
</script>
</body>
</html>
